<style>

*{

padding:0;

body{

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:700px;
background:linear-gradient(
135deg,
#ffffff 0%,
#f8fff0 20%,
#d8f3dc 50%,
#fff3bf 100%
);
padding:35px;
border-radius:25px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.25);
animation:fadeIn 1s;
}

.logo{
width:100px;
margin-bottom:15px;
}

h1{
color:#198754;
margin-bottom:10px;
}

.subtitle{
color:#555;
margin-bottom:25px;
}

.countdown{
font-size:30px;
font-weight:bold;
color:#dc3545;
margin:20px 0;
}

input{
width:100%;
padding:15px;
border:2px solid #198754;
border-radius:12px;
font-size:16px;
margin-top:15px;
}

button{
margin-top:15px;
padding:15px 30px;
border:none;
border-radius:12px;
background:#198754;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#146c43;
transform:scale(1.05);
}

.result{
display:none;
margin-top:25px;
padding:20px;
border-radius:15px;
background:#f8f9fa;
animation:zoomIn .7s;
}

.result h2{
margin-bottom:15px;
}

.data{
text-align:left;
margin-top:15px;
line-height:2;
font-size:18px;
}

.nilai-table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

.nilai-table th{
background:#198754;
color:white;
padding:10px;
}

.nilai-table td{
padding:10px;
border:1px solid #ddd;
}

.nilai-table tr:nth-child(even){
background:#f2f2f2;
}

.lulus{
color:#198754;
font-weight:bold;
font-size:24px;
}

.tidak{
color:red;
font-weight:bold;
font-size:24px;
}

.ucapan{
font-size:22px;
color:#198754;
font-weight:bold;
margin-top:15px;
animation:pulse 1s infinite;
}

.footer{
margin-top:20px;
font-size:14px;
color:#666;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

@keyframes zoomIn{
from{
transform:scale(.5);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

</style>

//=====================================
// COUNTDOWN
//=====================================

const x = setInterval(function(){

const sekarang = new Date().getTime();

const jarak =
tanggalPengumuman - sekarang;

const hari =
Math.floor(jarak/(1000*60*60*24));

const jam =
Math.floor((jarak%(1000*60*60*24))
/(1000*60*60));

const menit =
Math.floor((jarak%(1000*60*60))
/(1000*60));

const detik =
Math.floor((jarak%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
hari+" Hari "+
jam+" Jam "+
menit+" Menit "+
detik+" Detik";

if(jarak < 0){

clearInterval(x);

document.getElementById("countdownArea").style.display="none";
document.getElementById("cekArea").style.display="block";

}

},1000);


//=====================================
// CEK KELULUSAN
//=====================================

function cekKelulusan(){

const nisn =
document.getElementById("nisn").value;

const hasil =
document.getElementById("hasil");

if(siswa[nisn]){

let data = siswa[nisn];

let daftarNilai = "";

for(let mapel in data.nilai){
    daftarNilai += `
    <tr>
      <td>${mapel}</td>
      <td>${data.nilai[mapel]}</td>
    </tr>
    `;
}

let statusClass =
data.status=="LULUS"
? "lulus"
: "tidak";

if(data.status=="LULUS"){
    confetti({
        particleCount:250,
        spread:180,
        origin:{y:0.6}
    });
}

hasil.style.display="block";

hasil.innerHTML = `

<h2>HASIL KELULUSAN</h2>

<div class="data">

<b>Nama Siswa :</b> ${data.nama}<br>

<b>NISN :</b> ${data.nisn}<br><br>

<b>Status :</b>
<span class="${statusClass}">
${data.status}
</span>

${data.status=="LULUS" ? `
<div class="ucapan">
🎉 Selamat anda telah dinyatakan lulus dengan nilai:
</div>
` : `
<div style="color:red;font-weight:bold;font-size:20px;">
Tetap Semangat dan Jangan Menyerah
</div>
`}

<br>

<table class="nilai-table">
<tr>
<th>Mata Pelajaran</th>
<th>Nilai</th>
</tr>

${daftarNilai}

</table>

</div>

`;

}else{

hasil.style.display="block";

hasil.innerHTML=`
<h3 style="color:red">
Data Tidak Ditemukan
</h3>
`;

}

}

</script>

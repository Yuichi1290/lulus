<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengumuman Kelulusan MI Salafiyah Kranggan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<style>
.logo{
    width:120px;
    height:120px;
    object-fit:contain;
    margin-bottom:15px;
    animation:float 3s ease-in-out infinite;
}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f5132,#198754,#20c997);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:700px;
background:white;
padding:35px;
border-radius:25px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.25);
animation:fadeIn 1s;
}

.logo{
width:100px;
margin-bottom:15px;
}

h1{
color:#198754;
margin-bottom:10px;
}

.subtitle{
color:#555;
margin-bottom:25px;
}

.countdown{
font-size:30px;
font-weight:bold;
color:#dc3545;
margin:20px 0;
}

input{
width:100%;
padding:15px;
border:2px solid #198754;
border-radius:12px;
font-size:16px;
margin-top:15px;
}

button{
margin-top:15px;
padding:15px 30px;
border:none;
border-radius:12px;
background:#198754;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#146c43;
transform:scale(1.05);
}

.result{
display:none;
margin-top:25px;
padding:20px;
border-radius:15px;
background:#f8f9fa;
animation:zoomIn .7s;
}

.result h2{
margin-bottom:15px;
}

.data{
text-align:left;
margin-top:15px;
line-height:2;
font-size:18px;
}

.lulus{
color:#198754;
font-weight:bold;
font-size:24px;
}

.tidak{
color:red;
font-weight:bold;
font-size:24px;
}

.ucapan{
font-size:22px;
color:#198754;
font-weight:bold;
margin-top:15px;
animation:pulse 1s infinite;
}

.footer{
margin-top:20px;
font-size:14px;
color:#666;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

@keyframes zoomIn{
from{
transform:scale(.5);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

</style>
</head>
<body>

<div class="container">

<img src="logo.png" alt="Logo MI Salafiyah Kranggan" class="logo">

<h1>🎓 PENGUMUMAN KELULUSAN</h1>
<h2>MI SALAFIYAH KRANGGAN</h2>
<p class="subtitle">Tahun Pelajaran 2025/2026</p>

<div id="countdownArea">
<h3>Pengumuman Akan Dibuka Dalam</h3>
<div class="countdown" id="countdown"></div>
</div>

<div id="cekArea" style="display:none;">
<input type="text" id="nisn" placeholder="Masukkan NISN">

<button onclick="cekKelulusan()">
Lihat Kelulusan
</button>
</div>

<div class="result" id="hasil"></div>

<div class="footer">
© MI Salafiyah Kranggan
</div>

</div>

<script>

//=====================================
// TANGGAL PENGUMUMAN
//=====================================

const tanggalPengumuman =
new Date("June 10, 2026 10:00:00").getTime();


//=====================================
// DATA SISWA
//=====================================

const siswa = {

"1234567890":{
nama:"Ahmad Fauzan",
nisn:"1234567890",
nilai:"89.50",
status:"LULUS"
},

"1234567891":{
nama:"Muhammad Rizki",
nisn:"1234567891",
nilai:"85.75",
status:"LULUS"
},

"1234567892":{
nama:"Siti Aisyah",
nisn:"1234567892",
nilai:"72.40",
status:"TIDAK LULUS"
}

};


//=====================================
// COUNTDOWN
//=====================================

const x = setInterval(function(){

const sekarang = new Date().getTime();

const jarak =
tanggalPengumuman - sekarang;

const hari =
Math.floor(jarak/(1000*60*60*24));

const jam =
Math.floor((jarak%(1000*60*60*24))
/(1000*60*60));

const menit =
Math.floor((jarak%(1000*60*60))
/(1000*60));

const detik =
Math.floor((jarak%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
hari+" Hari "+
jam+" Jam "+
menit+" Menit "+
detik+" Detik";

if(jarak < 0){

clearInterval(x);

document.getElementById("countdownArea").style.display="none";
document.getElementById("cekArea").style.display="block";

}

},1000);


//=====================================
// CEK KELULUSAN
//=====================================

function cekKelulusan(){

const nisn =
document.getElementById("nisn").value;

const hasil =
document.getElementById("hasil");

if(siswa[nisn]){

let data = siswa[nisn];

let statusClass =
data.status=="LULUS"
? "lulus"
: "tidak";

let ucapan = "";

if(data.status=="LULUS"){

confetti({
particleCount:250,
spread:180,
origin:{y:0.6}
});

ucapan = `
<div class="ucapan">
🎉 SELAMAT ANDA DINYATAKAN LULUS 🎉
</div>
`;

}else{

ucapan = `
<div style="color:red;font-weight:bold;font-size:20px;">
Tetap Semangat dan Jangan Menyerah
</div>
`;

}

hasil.style.display="block";

hasil.innerHTML = `

<h2>HASIL KELULUSAN</h2>

<div class="data">

<b>Nama Siswa :</b> ${data.nama}<br>

<b>NISN :</b> ${data.nisn}<br>

<b>Nilai :</b> ${data.nilai}<br>

<b>Status :</b>
<span class="${statusClass}">
${data.status}
</span>

</div>

${ucapan}

`;

}else{

hasil.style.display="block";

hasil.innerHTML=`
<h3 style="color:red">
Data Tidak Ditemukan
</h3>
`;

}

}

</script>

</body>
</html>
